<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact • Finance4Future</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');

    body { font-family: 'Inter', system-ui, sans-serif; background: #000000; background-image: radial-gradient(ellipse at 50% 20%, rgba(255,255,255,0.025) 0%, transparent 55%), radial-gradient(ellipse at 50% 80%, rgba(255,255,255,0.015) 0%, transparent 45%), linear-gradient(180deg, rgba(255,255,255,0.01) 0%, transparent 30%, rgba(255,255,255,0.01) 100%); color: #fff; }

    .f4f-logo { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 800; letter-spacing: -0.04em; }
    .clean-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); }

    /* Hero Section - Glass Effect + Bigger */
    .hero, 
    .hero-section, 
    #hero,
    header.hero {
        min-height: 85vh !important;           /* Makes hero bigger */
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 60px 20px;
        
        /* Glassmorphism Effect */
        background: rgba(255, 255, 255, 0.08) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        margin: 20px;
    }

    /* Black Background with Depth */
    body {
        background-color: #0a0a0a !important;           /* Deep black */
        background-image: 
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 60px 60px;
    }

    /* Optional: Add subtle layered depth to sections */
    section, .section, .card {
        background: rgba(20, 20, 20, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
    }
  </style>
</head>
<body>
  <!-- Clean minimal fixed navbar -->
  <nav style="position: fixed; top: 0; z-index: 9999;" class="fixed top-0 left-0 right-0 z-[999]">
    <div class="max-w-5xl mx-auto mt-3 px-6 py-3 h-16 flex items-center justify-between bg-white/5 backdrop-blur-2xl border border-white/10 shadow-2xl rounded-3xl">
      <a href="index.html" class="f4f-logo text-xl tracking-[-1px] font-bold">
        <span class="text-[#FF2E92]">F</span>inance<span class="text-[#3B82F6]">4</span>Future
      </a>
      <div class="hidden md:flex items-center gap-x-8 text-sm">
        <a href="index.html" class="hover:text-[#FF2E92] transition-colors">Home</a>
        <a href="activities.html" class="hover:text-[#FF2E92] transition-colors">Activities</a>
        <a href="meet-the-team.html" class="hover:text-[#FF2E92] transition-colors">Team</a>
        <a href="contact.html" class="hover:text-[#FF2E92] transition-colors">Contact</a>
        <a href="https://www.instagram.com/finance.4future" target="_blank" rel="noopener" class="hover:text-[#FF2E92] transition-colors flex items-center gap-x-1.5">
          <i class="fa-brands fa-instagram"></i><span>Instagram</span>
        </a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSchH_io6kWDjHRBQhZ-bfIUkF8kb-GQ75v2Zf8AEupTkvYUbw/viewform?usp=sharing&ouid=117813947364170481853" target="_blank" class="clean-btn px-5 py-1.5 rounded-full text-xs">Join</a>
      </div>
      <div class="md:hidden">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSchH_io6kWDjHRBQhZ-bfIUkF8kb-GQ75v2Zf8AEupTkvYUbw/viewform?usp=sharing&ouid=117813947364170481853" target="_blank" class="clean-btn px-4 py-1 text-xs rounded-full">Join</a>
      </div>
    </div>
  </nav>

  <div class="pt-20 pb-16 max-w-4xl mx-auto px-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold tracking-tighter mb-2">Contact Us</h1>
      <p class="text-lg text-white/70">Reach the team or follow our work.</p>
    </div>

    <div class="max-w-xl mx-auto">
      <div class="clean-card rounded-2xl p-8">
        <div class="mb-6">
          <a href="mailto:finance4future.information@gmail.com" class="text-[#FF2E92] text-lg hover:underline">finance4future.information@gmail.com</a>
        </div>
        <div class="flex gap-x-6 text-sm">
          <a href="https://www.instagram.com/finance.4future" target="_blank" rel="noopener" class="hover:text-[#FF2E92]">Instagram</a>
          <a href="https://www.linkedin.com/company/financeforfuture" target="_blank" class="hover:text-[#FF2E92]">LinkedIn</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
